<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PokeMorph">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <title>PokeMorph</title>
    <style>
        :root { 
            --card-gold: #ffd700; --hp-green: #4caf50; --hp-red: #ff4422; 
            --poke-yellow: #ffcb05; --poke-blue: #3d7dca; --pokedex-red: #dc0a2d;
            --game-font: 'Luckiest Guy', cursive;
        }
        html, body { position: fixed; overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; box-sizing: border-box; touch-action: none; background: #000; display: flex; justify-content: center; align-items: center; font-family: 'Arial Rounded MT Bold', sans-serif; -webkit-user-select: none; user-select: none; }
        
        #start-gate { position: fixed; inset: 0; background: #3d7dca; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #sunburst { position: absolute; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #3d7dca 0deg 20deg, #4b8fe0 20deg 40deg); animation: rotateSun 20s linear infinite; opacity: 0.6; }
        .logo-container { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .logo-text { font-family: var(--game-font); font-size: clamp(50px, 18vw, 120px); color: var(--poke-yellow); -webkit-text-stroke: 2px var(--poke-blue); filter: drop-shadow(0 8px 0 var(--poke-blue)); margin: 0; letter-spacing: 2px; }
        .play-icon-btn { width: 130px; height: 130px; background: var(--poke-blue); border: 8px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: pulsePlay 1.5s infinite; }
        .play-triangle { width: 0; height: 0; border-top: 25px solid transparent; border-bottom: 25px solid transparent; border-left: 40px solid white; margin-left: 15px; }

        #pokedex-trigger { position: fixed; top: calc(env(safe-area-inset-top, 20px) + 5px); right: 15px; width: 50px; height: 50px; background: white; border: 4px solid #333; border-radius: 50%; z-index: 100; cursor: pointer; overflow: hidden; }
        #pokedex-trigger::before { content: ''; width: 100%; height: 6px; background: #333; position: absolute; top: 50%; left: 0; transform: translateY(-50%); z-index: 1; }
        #pokedex-trigger::after { content: ''; width: 100%; height: 50%; background: #ff0000; position: absolute; top: 0; border-bottom: 4px solid #333; }
        #poke-btn-white { width: 14px; height: 14px; background: white; border: 3px solid #333; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }

        #game-view { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: env(safe-area-inset-top, 20px) 10px env(safe-area-inset-bottom, 10px); box-sizing: border-box; }
        #pokemon-card { width: 98vw; height: 92vh; max-width: 500px; background: #fdfdfd; border: 8px solid var(--card-gold); border-radius: 35px; padding: 12px; display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; width: 100%; flex-shrink: 0; }
        #poke-name-badge { font-family: var(--game-font); font-size: 20px; color: #333; background: linear-gradient(to bottom, #fff, #ffd700); padding: 4px 15px; border-radius: 12px; border: 3px solid #333; text-transform: uppercase; }
        .hp-bar-outer { width: 100px; height: 16px; background: #222; border-radius: 10px; border: 2.5px solid #000; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: var(--hp-green); transition: width 0.4s ease; }

        .image-window { width: 100%; flex: 1; border: 4px solid #444; border-radius: 20px; position: relative; overflow: hidden; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; }
        #poke-img { height: 90%; filter: drop-shadow(0 0 10px white); z-index: 5; }

        #gameplay-ui { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 6px; flex-shrink: 0; }
        #core-row { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }
        .replay-btn { width: 45px; height: 45px; background: #00d4ff; border: 3px solid #fff; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 #008ba3; }
        #core-fragment { min-width: 100px; height: 45px; background: #222; color: #ffd700; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 3px solid #fff; font-family: var(--game-font); padding: 0 15px; text-transform: uppercase; }
        
        #checkpoints { display: flex; gap: 8px; margin-top: 2px; }
        .dot { width: 24px; height: 24px; background: #ddd; border-radius: 50%; border: 2.5px solid #999; display: flex; align-items: center; justify-content: center; color: transparent; font-weight: bold; }
        .dot.active { background: var(--hp-green); border-color: #1b5e20; color: white; transform: scale(1.1); }

        #word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-top: 4px; }
        .target { background: #fff; border: 2.5px solid #555; padding: 10px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; min-height: 45px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 #ccc; text-transform: uppercase; }
        .matched { background: var(--hp-green) !important; color: white !important; border-color: #1b5e20 !important; box-shadow: none !important; }
        .wrong { background: var(--hp-red) !important; color: white !important; animation: shake 0.4s; }

        #pokedex-view { position: fixed; inset: 0; padding-top: env(safe-area-inset-top, 20px); background: var(--pokedex-red); z-index: 9500; display: none; flex-direction: column; padding-left: 20px; padding-right: 20px; color: white; box-sizing: border-box; }
        #pokedex-list { flex: 1; overflow-y: scroll; display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 10px; padding: 20px 0; -webkit-overflow-scrolling: touch; }
        .dex-entry { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .dex-entry img { width: 55px; height: 55px; }
        .dex-entry.locked img { filter: brightness(0); opacity: 0.5; }

        #confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; }
        .modal-box { background: white; border: 8px solid var(--pokedex-red); border-radius: 30px; padding: 30px; width: 85%; max-width: 400px; text-align: center; color: #333; }
        .modal-btns { display: flex; gap: 20px; justify-content: center; margin-top: 25px; }
        .modal-btn { padding: 15px 30px; border-radius: 15px; font-family: var(--game-font); font-size: 20px; border: none; cursor: pointer; color: white; flex: 1; }
        .btn-yes { background: var(--hp-green); } .btn-no { background: var(--hp-red); }

        #evo-scene { position: fixed; inset: 0; z-index: 8000; display: none; background: radial-gradient(circle, #fff, #3a8cff, #000); flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #evo-scene.active { display: flex; animation: rotateBg 1s infinite linear; }
        #fx-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 8500; }
        @keyframes rotateSun { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotateBg { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes shake { 0%, 100% {transform:translateX(0)} 20% {transform:translateX(-8px)} 80% {transform:translateX(8px)} }
        @keyframes pulsePlay { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .game-overlay { display: none; position: absolute; inset: 0; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; border-radius: 25px; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="start-gate">
    <div id="sunburst"></div>
    <div class="logo-container">
        <h1 class="logo-text">PokeMorph</h1>
        <div class="play-icon-btn" onclick="startGame()"><div class="play-triangle"></div></div>
    </div>
</div>

<div id="pokedex-trigger" onclick="openDex()"><div id="poke-btn-white"></div></div>

<div id="confirm-modal">
    <div class="modal-box"><h3>Reset Data?</h3><p>Start your journey over?</p><div class="modal-btns"><button class="modal-btn btn-yes" onclick="confirmReset(true)">YES</button><button class="modal-btn btn-no" onclick="confirmReset(false)">NO</button></div></div>
</div>

<div id="pokedex-view">
    <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 2px solid white; padding-bottom: 10px; flex-shrink: 0;"><h2 id="dex-title" style="margin:0; font-family: var(--game-font);">POKEDEX</h2><div onclick="closeDex()" style="font-size:30px; cursor:pointer">X</div></div>
    <div id="pokedex-list"></div>
    <div style="padding:10px; border-top:2px solid white; display:flex; justify-content:center; padding-bottom: env(safe-area-inset-bottom, 15px); flex-shrink: 0;"><div style="width: 60px; height: 60px; background: #ff4422; border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;" onclick="showResetModal()"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></div></div>
</div>

<div id="evo-scene">
    <img id="evo-poke-img" style="height:60%" src="">
    <div id="evo-text" style="position: absolute; bottom: 15%; color: white; font-family: var(--game-font); font-size: 42px; z-index: 20;">...</div>
</div>

<canvas id="fx-canvas"></canvas>

<div id="game-view">
    <div id="pokemon-card">
        <div class="header"><div id="poke-name-badge">NAME</div><div class="hp-bar-outer"><div id="hp-fill"></div></div></div>
        <div class="image-window"><div id="backdrop-container" style="position:absolute; inset:0;"></div><img id="poke-img" src=""></div>
        <div id="gameplay-ui">
            <div id="core-cluster" style="display:flex; flex-direction:column; align-items:center;">
                <div id="core-row"><button class="replay-btn" onclick="replaySound()"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.25 2.5 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button><div id="core-fragment">...</div></div>
                <div id="checkpoints"><div class="dot" id="dot-0">✓</div><div class="dot" id="dot-1">✓</div><div class="dot" id="dot-2">✓</div></div>
            </div>
            <div id="word-grid"></div>
        </div>
        <div id="finale-overlay" class="game-overlay" style="background: radial-gradient(circle, #2a0845, #000); color: gold;">
            <img id="mega-img-final" style="width:180px; filter: drop-shadow(0 0 30px #00d4ff);" src=""><div style="background: gold; color: black; padding: 5px 20px; border-radius: 10px; font-weight: 900; margin: 15px 0; font-family: var(--game-font);">MEGA EVOLVED!</div>
            <div id="parade-row" style="display:flex; gap:10px; margin-bottom: 20px;"></div><button class="target" style="background: var(--hp-green); color: white; border: 4px solid #fff; padding: 15px 40px; border-radius: 20px;" onclick="resetGame()">NEXT POKEMON</button>
        </div>
        <div id="defeat-overlay" class="game-overlay" style="background: #222; color: white;"><p>Try again!</p><button class="target" style="background: var(--hp-green); color: white; padding: 15px 30px; border-radius: 20px;" onclick="resetGame()">TRY AGAIN</button></div>
    </div>
</div>

        // expanded to 150+ internally to match the 150+ pokemon
    ];

    const backdropSVGs = { fire: `<svg viewBox="0 0 200 100" preserveAspectRatio="none" style="width:100%;height:100%"><rect width="200" height="100" fill="#a82e2e"/><path d="M0 100 L40 30 L80 100 L140 10 L200 100 Z" fill="#6b1d1d"/></svg>`, water: `<svg viewBox="0 0 200 100" preserveAspectRatio="none" style="width:100%;height:100%"><rect width="200" height="100" fill="#87CEEB"/><path d="M0 80 Q50 60 100 80 T200 80 L200 100 L0 100 Z" fill="#4169E1"/></svg>`, grass: `<svg viewBox="0 0 200 100" preserveAspectRatio="none" style="width:100%;height:100%"><rect width="200" height="100" fill="#a8e063"/><circle cx="50" cy="85" rx="60" ry="20" fill="#56ab2f"/></svg>` };
    const trapPool = ["CAT", "DOG", "SUN", "RUN", "BIG", "RED", "FLY", "TOP", "HAT", "VAN", "BOX", "JAM", "SKY", "LOG", "NET", "TEN"];
    const synth = window.speechSynthesis, audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let family, stageIdx = 0, currentSet, matchesThisRound = 0, isGameOver = false, usedRoots = [];
    let unlocked = JSON.parse(localStorage.getItem('pm_unlocked_v16')) || [];
    let completedFamilies = JSON.parse(localStorage.getItem('pm_completed_v16')) || [];
    const canvas = document.getElementById('fx-canvas'), ctx = canvas.getContext('2d');
    let particles = [];
    function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', initCanvas); initCanvas();

    function animateFX() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(isGameOver && Math.random() < 0.1) {
            const x = Math.random()*canvas.width, y = Math.random()*canvas.height*0.5;
            for(let i=0; i<30; i++) { particles.push({x, y, vx:(Math.random()-0.5)*18, vy:(Math.random()-0.8)*18, c:`hsl(${Math.random()*360},100%,60%)`, l:1, g:0.25}); playSfx('pop'); }
        }
        particles.forEach((p, i) => { p.vy += (p.g || 0); p.x+=p.vx; p.y+=p.vy; p.l-=0.015; ctx.globalAlpha=p.l; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill(); if(p.l<=0) particles.splice(i,1); });
        requestAnimationFrame(animateFX);
    }

    function playSfx(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        if(type === 'chime') { o.type='sine'; o.frequency.setValueAtTime(800, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime+0.1); g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime+0.4); }
        if(type === 'miss') { o.type='sawtooth'; o.frequency.setValueAtTime(120, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime+0.3); g.gain.setValueAtTime(0.15, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime+0.4); }
        if(type === 'evo_build') { for(let i=0; i<35; i++) { const t = audioCtx.currentTime + (i * 2.8 / 35); const osc = audioCtx.createOscillator(), gn = audioCtx.createGain(); osc.type='square'; osc.frequency.setValueAtTime(150 + (i * 55), t); gn.gain.setValueAtTime(0.06, t); gn.gain.exponentialRampToValueAtTime(0.001, t + 0.1); osc.connect(gn); gn.connect(audioCtx.destination); osc.start(t); osc.stop(t + 0.1); } }
        if(type === 'pop') { o.type='sine'; o.frequency.setValueAtTime(1500 + Math.random()*1000, audioCtx.currentTime); g.gain.setValueAtTime(0.02, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.1); o.start(); o.stop(audioCtx.currentTime+0.1); }
    }

    function speak(txt) { return new Promise(r => { synth.cancel(); const u = new SpeechSynthesisUtterance(txt.toLowerCase()); u.lang='en-GB'; u.rate=0.88; u.onend=r; synth.speak(u); setTimeout(r, 2000); }); }
    function startGame() { document.getElementById('start-gate').style.display='none'; if(audioCtx.state==='suspended') audioCtx.resume(); resetGame(); }
    function replaySound() { if(currentSet) speak(currentSet.core); }

    function handleTap(el, isCorrect, say) {
        if(el.classList.contains('matched') || el.classList.contains('wrong')) return;
        if(isCorrect) {
            document.getElementById(`dot-${matchesThisRound}`).classList.add('active'); el.innerText = say.toUpperCase(); el.classList.add('matched'); playSfx('chime'); matchesThisRound++;
            if(matchesThisRound === 3) {
                const pk = (stageIdx < family.p.length) ? family.p[stageIdx] : family.mega;
                if(!unlocked.includes(pk.i)) { unlocked.push(pk.i); localStorage.setItem('pm_unlocked_v16', JSON.stringify(unlocked)); }
                speak(say).then(() => setTimeout(runEvolution, 400)); 
            } else speak(say);
        } else { 
            el.classList.add('wrong'); playSfx('miss'); document.getElementById('hp-fill').style.width = "0%";
            setTimeout(() => { document.getElementById('defeat-overlay').style.display='flex'; }, 400);
        }
    }

    async function initStage() {
        matchesThisRound = 0; 
        const p = (stageIdx < family.p.length) ? family.p[stageIdx] : family.mega;
        document.getElementById('backdrop-container').innerHTML = backdropSVGs[family.t] || backdropSVGs.fire;
        document.getElementById('hp-fill').style.width = "100%"; document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        document.getElementById('poke-name-badge').innerText = p.n;
        document.getElementById('poke-img').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.i}.png`;
        let avail = curriculum.filter(c => !usedRoots.includes(c.core));
        if(avail.length === 0) { usedRoots = []; avail = curriculum; }
        currentSet = avail[Math.floor(Math.random()*avail.length)]; usedRoots.push(currentSet.core);
        document.getElementById('core-fragment').innerText = currentSet.core;
        
        const grid = document.getElementById('word-grid'); grid.innerHTML = '';
        let opts = [];
        const coreReg = new RegExp(currentSet.core, 'gi');
        currentSet.sets.slice(0,3).forEach(word => {
            let mask = word.toUpperCase().replace(coreReg, "____");
            opts.push({text: mask, ok:true, s:word});
        });
        while(opts.length < 3) { opts.push({text: "RE ____", ok:true, s: "Re"+currentSet.core}); }
        let traps = [...trapPool].sort(()=>Math.random()-0.5);
        while(opts.length < 8) { opts.push({text: "____ " + traps.pop(), ok:false}); }
        
        opts.sort(()=>Math.random()-0.5).forEach(o => { 
            const d = document.createElement('div'); d.className='target'; d.innerText=o.text; 
            d.onclick = () => handleTap(d, o.ok, o.s || o.text.replace('____', currentSet.core)); grid.appendChild(d); 
        });
        await speak(currentSet.core);
    }

    async function runEvolution() {
        const scene = document.getElementById('evo-scene'), evoImg = document.getElementById('evo-poke-img');
        const oldN = (stageIdx < family.p.length) ? family.p[stageIdx].n : family.mega.n;
        if(stageIdx >= family.p.length - 1) { 
            const nextN = family.mega.n; evoImg.src = document.getElementById('poke-img').src; 
            document.getElementById('evo-text').innerText = oldN.toUpperCase() + "..."; scene.classList.add('active'); playSfx('evo_build');
            await speak(`${oldN} is evolving!`);
            evoImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${family.mega.i}.png`;
            document.getElementById('evo-text').innerText = nextN.toUpperCase() + "!"; await speak(`${oldN} evolved into ${nextN}!`);
            setTimeout(() => {
                scene.classList.remove('active'); isGameOver = true; 
                if(!unlocked.includes(family.mega.i)) { unlocked.push(family.mega.i); localStorage.setItem('pm_unlocked_v16', JSON.stringify(unlocked)); }
                if(!completedFamilies.includes(family.id)) { completedFamilies.push(family.id); localStorage.setItem('pm_completed_v16', JSON.stringify(completedFamilies)); }
                document.getElementById('mega-img-final').src = evoImg.src;
                const row = document.getElementById('parade-row'); row.innerHTML = "";
                family.p.forEach(px => { row.innerHTML += `<img style="width:40px" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${px.i}.png">`; });
                document.getElementById('finale-overlay').style.display = 'flex';
                speak("Incredible! You are a Mega Master!");
            }, 1000);
            return;
        }
        stageIdx++; const nextN = family.p[stageIdx].n;
        evoImg.src = document.getElementById('poke-img').src;
        document.getElementById('evo-text').innerText = oldN.toUpperCase() + "..."; scene.classList.add('active'); playSfx('evo_build');
        await speak(`${oldN} is evolving!`);
        evoImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${family.p[stageIdx].i}.png`;
        document.getElementById('evo-text').innerText = nextN.toUpperCase() + "!"; await speak(`${oldN} evolved into ${nextN}!`);
        setTimeout(() => { scene.classList.remove('active'); initStage(); }, 1000);
    }

    function openDex() {
        const list = document.getElementById('pokedex-list'); list.innerHTML = ''; let count = 0, total = 0;
        megaLibrary.forEach(fam => { [...fam.p, fam.mega].forEach(pk => { total++; 
            const isFound = unlocked.includes(pk.i); if(isFound) count++;
            list.innerHTML += `<div class="dex-entry ${isFound?'':'locked'}"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pk.i}.png"></div>`;
        }); });
        document.getElementById('dex-title').innerText = `FOUND: ${count}/${total}`; document.getElementById('pokedex-view').style.display = 'flex';
    }
    function closeDex() { document.getElementById('pokedex-view').style.display = 'none'; }
    function showResetModal() { document.getElementById('confirm-modal').style.display = 'flex'; }
    function confirmReset(yes) { if(yes) { unlocked = []; completedFamilies = []; localStorage.clear(); closeDex(); document.getElementById('start-gate').style.display='flex'; } document.getElementById('confirm-modal').style.display = 'none'; }
    function resetGame() { 
        isGameOver = false; stageIdx = 0; usedRoots = []; 
        document.getElementById('finale-overlay').style.display = 'none'; document.getElementById('defeat-overlay').style.display = 'none'; 
        let pool = megaLibrary.filter(f => !completedFamilies.includes(f.id));
        if(pool.length === 0) { completedFamilies = []; pool = megaLibrary; }
        family = pool[Math.floor(Math.random()*pool.length)]; initStage(); 
    }
    animateFX();
</script>
</body>
</html>
