<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PokéMorph v11.3</title>
    <style>
        :root { 
            --card-gold: #ffd700;
            --hp-green: #4caf50; --hp-yellow: #ffcc00; --hp-red: #ff4422; 
            --poke-yellow: #ffcb05; --poke-blue: #3d7dca;
            --pokedex-red: #dc0a2d;
        }
        html, body { 
            position: fixed; overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; 
            box-sizing: border-box; touch-action: none; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Arial Rounded MT Bold', sans-serif; -webkit-user-select: none; user-select: none; 
        }

        #start-gate { position: fixed; inset: 0; background: radial-gradient(circle, #1a1c2c 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-text { font-size: 15vw; font-weight: 900; color: var(--poke-yellow); -webkit-text-stroke: 2px var(--poke-blue); text-shadow: 0 4px 0 var(--poke-blue); position: relative; }
        .logo-text::after { content: 'PokéMorph'; position: absolute; left: 0; top: 0; width: 100%; background: linear-gradient(to bottom, #fff, var(--poke-yellow) 60%, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 0; }
        .play-icon-btn { width: 100px; height: 100px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; animation: pulsePlay 2s infinite; margin-top: 30px; }
        .play-triangle { width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 35px solid var(--poke-blue); margin-left: 8px; }

        #game-view { 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 10px);
            box-sizing: border-box;
        }

        #pokedex-trigger { 
            position: fixed; top: calc(env(safe-area-inset-top, 20px) + 5px); right: 15px; 
            width: 50px; height: 50px; background: white; border: 4px solid #333; border-radius: 50%; 
            z-index: 100; cursor: pointer; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        #pokedex-trigger::before { content: ''; width: 100%; height: 50%; background: #ff0000; position: absolute; top: 0; border-bottom: 4px solid #333; }
        #pokedex-trigger::after { content: ''; width: 14px; height: 14px; background: white; border: 3px solid #333; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; }

        #pokemon-card { 
            width: 95vw; height: 85vh; max-width: 500px; background: #fdfdfd; 
            border: 8px solid var(--card-gold); border-radius: 35px; padding: 12px; 
            display: flex; flex-direction: column; position: relative; box-sizing: border-box; z-index: 10; 
        }

        .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 8px; }
        #poke-name-badge { font-size: 22px; color: #333; background: white; padding: 4px 15px; border-radius: 15px; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .hp-bar { width: 120px; height: 16px; background: #222; border-radius: 10px; border: 2px solid #000; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: var(--hp-green); transition: width 0.4s ease; }

        .image-window { width: 100%; flex-grow: 1; border: 4px solid #444; border-radius: 20px; position: relative; overflow: hidden; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        #poke-img { height: 85%; filter: drop-shadow(0 0 15px white); z-index: 5; }

        #core-area { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; }
        .replay-btn { width: 50px; height: 50px; background: #00d4ff; border: 3px solid #fff; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #008ba3; }
        #core-fragment { min-width: 110px; height: 50px; background: #222; color: #ffd700; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 3px solid #fff; }
        
        #checkpoints { display: flex; gap: 8px; }
        .dot { width: 24px; height: 24px; background: #ccc; border-radius: 50%; border: 2px solid #888; display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent; font-weight: bold; }
        .dot.active { background: var(--hp-green); border-color: #1b5e20; color: white; transform: scale(1.1); }

        #word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 5px; flex-shrink: 0; }
        .target { background: #fff; border: 2px solid #555; padding: 10px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; min-height: 45px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 0 #ccc; }
        .matched { background: var(--hp-green) !important; color: white !important; pointer-events: none; }
        .wrong { background: var(--hp-red) !important; color: white !important; animation: shake 0.4s; }

        #pokedex-view { position: fixed; inset: 0; padding-top: env(safe-area-inset-top, 20px); background: var(--pokedex-red); z-index: 9500; display: none; flex-direction: column; padding-left: 20px; padding-right: 20px; color: white; }
        #pokedex-list { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; padding: 20px 0; }
        .dex-entry { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .dex-entry.locked img { filter: brightness(0) contrast(0.5); opacity: 0.8; }
        
        #evo-scene { position: fixed; inset: 0; z-index: 8000; display: none; background: radial-gradient(circle, #fff, #3a8cff, #000); flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #evo-scene.active { display: flex; animation: rotateBg 1s infinite linear; }
        #fx-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 8500; }
        
        @keyframes rotateBg { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes shake { 0%, 100% {transform:translateX(0)} 20% {transform:translateX(-8px)} 80% {transform:translateX(8px)} }
        @keyframes pulsePlay { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .game-overlay { display: none; position: absolute; inset: 0; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; border-radius: 25px; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="start-gate">
    <div class="logo-text">PokéMorph</div>
    <div class="play-icon-btn" onclick="startGame()"><div class="play-triangle"></div></div>
</div>

<div id="pokedex-trigger" onclick="openDex()"></div>

<div id="pokedex-view">
    <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 2px solid white; padding-bottom: 10px;">
        <h2 style="margin:0">POKÉDEX</h2>
        <div onclick="closeDex()" style="font-size:30px; cursor:pointer">X</div>
    </div>
    <div id="pokedex-list"></div>
    <div style="padding:10px; border-top:2px solid white; display:flex; justify-content:center; padding-bottom: env(safe-area-inset-bottom, 15px);">
        <button style="background:none; border:none; font-size:32px; cursor:pointer;" onclick="resetCollection()">🗑️</button>
    </div>
</div>

<div id="evo-scene">
    <img id="evo-poke-img" style="height:60%" src="">
    <div id="evo-text" style="position: absolute; bottom: 15%; color: white; font-size: 32px; font-weight: 900; z-index: 20;">WHAT?</div>
</div>

<canvas id="fx-canvas"></canvas>

<div id="game-view">
    <div id="pokemon-card">
        <div id="finale-overlay" class="game-overlay" style="background: radial-gradient(circle, #2a0845, #000); color: gold;">
            <img id="mega-img-final" style="width:180px; filter: drop-shadow(0 0 30px #00d4ff);" src="">
            <div style="background: gold; color: black; padding: 5px 20px; border-radius: 10px; font-weight: 900; margin: 15px 0;">MEGA EVOLVED!</div>
            <div id="parade-row" style="display:flex; gap:10px; margin-bottom: 20px;"></div>
            <button class="target" style="background: var(--hp-green); color: white; border: 4px solid #fff; padding: 15px 40px; border-radius: 20px;" onclick="resetGame()">NEXT POKÉMON</button>
        </div>

        <div id="defeat-overlay" class="game-overlay" style="background: #222; color: white;">
            <img id="ko-img" style="width: 140px; filter: grayscale(1);" src="">
            <p>Don't give up! Try again!</p>
            <button class="target" style="background: var(--hp-green); color: white; padding: 15px 30px; border-radius: 20px;" onclick="resetGame()">TRY AGAIN</button>
        </div>

        <div class="header">
            <div id="poke-name-badge">NAME</div>
            <div class="hp-bar"><div id="hp-fill"></div></div>
        </div>
        <div class="image-window" id="img-win">
            <div id="backdrop-container" style="position:absolute; inset:0;"></div>
            <img id="poke-img" src="">
        </div>
        <div id="gameplay-ui">
            <div id="core-area">
                <button class="replay-btn" onclick="replaySound()">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
                <div id="core-fragment">...</div>
                <div id="checkpoints">
                    <div class="dot" id="dot-0">✓</div><div class="dot" id="dot-1">✓</div><div class="dot" id="dot-2">✓</div>
                </div>
            </div>
            <div id="word-grid"></div>
        </div>
    </div>
</div>

<script>
    const megaLibrary = [
        { t:'fire', p:[{n:'Charmander',i:4},{n:'Charmeleon',i:5},{n:'Charizard',i:6}], mega:{n:'Mega Charizard X', i:10034} },
        { t:'water', p:[{n:'Squirtle',i:7},{n:'Wartortle',i:8},{n:'Blastoise',i:9}], mega:{n:'Mega Blastoise', i:10036} },
        { t:'grass', p:[{n:'Bulbasaur',i:1},{n:'Ivysaur',i:2},{n:'Venusaur',i:3}], mega:{n:'Mega Venusaur', i:10033} },
        { t:'fire', p:[{n:'Torchic',i:255},{n:'Combusken',i:256},{n:'Blaziken',i:257}], mega:{n:'Mega Blaziken', i:10050} },
        { t:'water', p:[{n:'Mudkip',i:258},{n:'Marshtomp',i:259},{n:'Swampert',i:260}], mega:{n:'Mega Swampert', i:10064} },
        { t:'grass', p:[{n:'Treecko',i:252},{n:'Grovyle',i:253},{n:'Sceptile',i:254}], mega:{n:'Mega Sceptile', i:10065} },
        { t:'fire', p:[{n:'Gastly',i:92},{n:'Haunter',i:93},{n:'Gengar',i:94}], mega:{n:'Mega Gengar', i:10038} },
        { t:'water', p:[{n:'Beldum',i:374},{n:'Metang',i:375},{n:'Metagross',i:376}], mega:{n:'Mega Metagross', i:10076} },
        { t:'fire', p:[{n:'Gible',i:443},{n:'Gabite',i:444},{n:'Garchomp',i:445}], mega:{n:'Mega Garchomp', i:10058} },
        { t:'grass', p:[{n:'Larvitar',i:246},{n:'Pupitar',i:247},{n:'Tyranitar',i:248}], mega:{n:'Mega Tyranitar', i:10049} }
    ];

    const masterWordData = [
        { core: "FORM", items: [{ans:"INFORMATION", mask:"IN ____ ATION", p:"In-for-may-shun"}, {ans:"UNIFORM", mask:"UNI ____", p:"You-nih-form"}, {ans:"FORMAT", mask:"____ AT", p:"For-mat"}] },
        { core: "PLAY", items: [{ans:"PLAYGROUND", mask:"____ GROUND", p:"Play-ground"}, {ans:"REPLAY", mask:"RE ____", p:"Ree-play"}, {ans:"PLAYER", mask:"____ ER", p:"Play-er"}] },
        { core: "SIGN", items: [{ans:"DESIGN", mask:"DE ____", p:"Dee-zine"}, {ans:"SIGNAL", mask:"____ AL", p:"Sig-nal"}, {ans:"SIGNATURE", mask:"____ ATURE", p:"Sig-nah-chur"}] },
        { core: "LIGHT", items: [{ans:"FLASHLIGHT", mask:"FLASH ____", p:"Flash-light"}, {ans:"LIGHTNING", mask:"____ NING", p:"Light-ning"}, {ans:"SUNLIGHT", mask:"SUN ____", p:"Sun-light"}] },
        { core: "POWER", items: [{ans:"POWERFUL", mask:"____ FUL", p:"Pow-er-ful"}, {ans:"EMPOWER", mask:"EM ____", p:"Em-pow-er"}, {ans:"POWERLESS", mask:"____ LESS", p:"Pow-er-less"}] },
        { core: "PRESS", items: [{ans:"EXPRESS", mask:"EX ____", p:"Ex-presh"}, {ans:"IMPRESS", mask:"IM ____", p:"Im-presh"}, {ans:"PRESSURE", mask:"____ URE", p:"Presh-ur"}] },
        { core: "PORT", items: [{ans:"AIRPORT", mask:"AIR ____", p:"Air-port"}, {ans:"SUPPORT", mask:"SUP ____", p:"Sup-port"}, {ans:"REPORT", mask:"RE ____", p:"Re-port"}] }
    ];

    const backdropSVGs = {
        fire: `<svg viewBox="0 0 200 100" style="width:100%; height:100%" preserveAspectRatio="none"><rect width="200" height="100" fill="#a82e2e"/><path d="M0 100 L40 30 L80 100 L140 10 L200 100 Z" fill="#6b1d1d"/><circle cx="30" cy="30" r="5" fill="#ffcc00" opacity=".4"/></svg>`,
        water: `<svg viewBox="0 0 200 100" style="width:100%; height:100%" preserveAspectRatio="none"><rect width="200" height="100" fill="#87CEEB"/><path d="M0 80 Q50 60 100 80 T200 80 L200 100 L0 100 Z" fill="#4169E1"/><circle cx="170" cy="30" r="10" fill="white" opacity=".5"/></svg>`,
        grass: `<svg viewBox="0 0 200 100" style="width:100%; height:100%" preserveAspectRatio="none"><rect width="200" height="100" fill="#a8e063"/><circle cx="50" cy="85" rx="60" ry="20" fill="#56ab2f"/><circle cx="150" cy="90" rx="70" ry="25" fill="#2E8B57"/></svg>`
    };

    const trapPool = ["CAT", "DOG", "SUN", "RUN", "BIG", "RED", "FLY", "TOP", "HAT", "VAN", "BOX", "JAM", "SKY", "LOG"];
    const synth = window.speechSynthesis, audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let family, stageIdx = 0, hp = 100, currentSet, matchesThisRound = 0, isGameOver = false;
    let unlocked = JSON.parse(localStorage.getItem('pmUnlocked_v11')) || [];

    const canvas = document.getElementById('fx-canvas'), ctx = canvas.getContext('2d');
    let particles = [];
    function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', initCanvas); initCanvas();

    function animateFX() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(isGameOver && Math.random() < 0.08) {
            const x = Math.random()*canvas.width, y = Math.random()*canvas.height*0.5;
            for(let i=0; i<40; i++) particles.push({x, y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.8)*15, c:`hsl(${Math.random()*360},100%,60%)`, l:1, g:0.25});
        }
        particles.forEach((p, i) => { p.vy += (p.g || 0); p.x+=p.vx; p.y+=p.vy; p.l-=0.02; ctx.globalAlpha=p.l; ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill(); if(p.l<=0) particles.splice(i,1); });
        requestAnimationFrame(animateFX);
    }

    function playSfx(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
        if(type === 'chime') { o.type='sine'; o.frequency.setValueAtTime(800, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime+0.1); g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime+0.4); }
        if(type === 'miss') { o.type='sawtooth'; o.frequency.setValueAtTime(80, audioCtx.currentTime); g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime+0.4); }
        if(type === 'evo_build') { for(let i=0; i<30; i++) { const t = audioCtx.currentTime + (i * 2.5 / 30); const osc = audioCtx.createOscillator(), gn = audioCtx.createGain(); osc.type='square'; osc.frequency.setValueAtTime(150 + (i * 60), t); gn.gain.setValueAtTime(0.06, t); gn.gain.exponentialRampToValueAtTime(0.001, t + 0.1); osc.connect(gn); gn.connect(audioCtx.destination); osc.start(t); osc.stop(t + 0.1); } }
    }

    function speak(txt) { return new Promise(r => { synth.cancel(); const u = new SpeechSynthesisUtterance(txt); u.lang='en-GB'; u.rate=0.85; u.onend=r; synth.speak(u); setTimeout(r, 2200); }); }
    function startGame() { document.getElementById('start-gate').style.display='none'; if(audioCtx.state==='suspended') audioCtx.resume(); resetGame(); }
    function replaySound() { if(currentSet) speak(currentSet.core); }

    function handleTap(el, isCorrect, full, phonetic) {
        if(el.classList.contains('matched') || el.classList.contains('wrong')) return;
        if(isCorrect) {
            document.getElementById(`dot-${matchesThisRound}`).classList.add('active');
            el.innerText = full; el.classList.add('matched'); playSfx('chime');
            matchesThisRound++;
            if(matchesThisRound === 3) {
                if(!unlocked.includes(family.p[stageIdx].i)) { unlocked.push(family.p[stageIdx].i); localStorage.setItem('pmUnlocked_v11', JSON.stringify(unlocked)); }
                speak(phonetic || full).then(() => setTimeout(runEvolution, 400)); 
            } else speak(phonetic || full);
        } else { 
            el.classList.add('wrong'); hp -= 33.4; playSfx('miss'); 
            const fill = document.getElementById('hp-fill'); fill.style.width = Math.max(0, hp) + "%";
            fill.style.background = hp > 66 ? "var(--hp-green)" : hp > 33 ? "var(--hp-yellow)" : "var(--hp-red)";
            if(hp <= 1) { document.getElementById('ko-img').src = document.getElementById('poke-img').src; document.getElementById('defeat-overlay').style.display='flex'; }
            setTimeout(()=>el.classList.remove('wrong'), 500);
        }
    }

    async function initStage() {
        hp = 100; matchesThisRound = 0; const p = family.p[stageIdx];
        document.getElementById('backdrop-container').innerHTML = backdropSVGs[family.t];
        document.getElementById('hp-fill').style.width = "100%"; document.getElementById('hp-fill').style.background = "var(--hp-green)";
        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        document.getElementById('poke-name-badge').innerText = p.n;
        document.getElementById('poke-img').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.i}.png`;
        currentSet = masterWordData[Math.floor(Math.random()*masterWordData.length)];
        document.getElementById('core-fragment').innerText = currentSet.core;
        const grid = document.getElementById('word-grid'); grid.innerHTML = '';
        let opts = currentSet.items.slice(0,3).map(i => ({text: i.mask, ok:true, f:i.ans, p:i.p}));
        [...trapPool].sort(()=>Math.random()-0.5).slice(0,5).forEach(t => opts.push({text: "____ "+t, ok:false}));
        opts.sort(()=>Math.random()-0.5).forEach(o => { const d = document.createElement('div'); d.className='target'; d.innerText=o.text; d.onclick = () => handleTap(d, o.ok, o.f, o.p); grid.appendChild(d); });
        await speak(currentSet.core);
    }

    async function runEvolution() {
        if(stageIdx >= 2) { 
            if(!unlocked.includes(family.mega.i)) { unlocked.push(family.mega.i); localStorage.setItem('pmUnlocked_v11', JSON.stringify(unlocked)); }
            isGameOver = true; 
            document.getElementById('mega-img-final').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${family.mega.i}.png`;
            const row = document.getElementById('parade-row'); row.innerHTML = "";
            family.p.forEach(p => { row.innerHTML += `<img style="width:50px" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.i}.png">`; });
            document.getElementById('finale-overlay').style.display = 'flex'; 
            speak("Amazing! You are a true Mega Master!");
            return; 
        }
        const oldN = family.p[stageIdx].n; stageIdx++;
        const scene = document.getElementById('evo-scene'), evoImg = document.getElementById('evo-poke-img');
        evoImg.src = document.getElementById('poke-img').src; scene.classList.add('active'); playSfx('evo_build');
        await speak(`${oldN} is evolving!`);
        for(let i=0; i<40; i++) particles.push({x:canvas.width/2, y:canvas.height/2, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, c:'#fff', l:1});
        evoImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${family.p[stageIdx].i}.png`;
        document.getElementById('evo-text').innerText = family.p[stageIdx].n.toUpperCase() + "!";
        await speak(`${oldN} evolved into ${family.p[stageIdx].n}!`);
        setTimeout(() => { scene.classList.remove('active'); initStage(); }, 1000);
    }

    function openDex() {
        const list = document.getElementById('pokedex-list'); list.innerHTML = '';
        megaLibrary.forEach(fam => { [...fam.p, fam.mega].forEach(pk => {
            const isFound = unlocked.includes(pk.i);
            list.innerHTML += `<div class="dex-entry ${isFound?'':'locked'}"><img style="width:60px" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pk.i}.png"><div style="font-size:10px">${isFound ? pk.n : '????'}</div></div>`;
        }); });
        document.getElementById('pokedex-view').style.display = 'flex';
    }
    function closeDex() { document.getElementById('pokedex-view').style.display = 'none'; }
    function resetCollection() { if(confirm("Are you sure? This will reset your whole collection!")) { unlocked = []; localStorage.removeItem('pmUnlocked_v11'); closeDex(); document.getElementById('start-gate').style.display='flex'; } }
    function resetGame() { isGameOver = false; stageIdx = 0; document.getElementById('finale-overlay').style.display = 'none'; document.getElementById('defeat-overlay').style.display = 'none'; family = megaLibrary[Math.floor(Math.random()*megaLibrary.length)]; initStage(); }
    animateFX();
</script>
</body>
</html>
